name: Continuous Integration
on: [push, pull_request]

jobs:
  clippy:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{matrix.os}}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
      - name: Check the lints
        uses: actions-rs/cargo@v1
        with:
          command: clippy
          args: --all-targets -- -D warnings

  test:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{matrix.os}}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
      - name: Run the tests
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --locked

  formatting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
      - name: Check the formatting
        uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: --all -- --check

  security_audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
      - name: Install cargo-audit
        uses: actions-rs/cargo@v1
        with:
          command: install
          args: cargo-audit
      - name: Run security audit
        uses: actions-rs/cargo@v1
        with:
          command: audit
          args: --deny warnings

  build:
    needs: [clippy, formatting, test, security_audit]
    strategy:
      matrix:
        os:
          - {
              NAME: linux,
              OS: ubuntu-latest,
              ARCH: x86_64,
              PATH: target/optimized/bob,
              TARGET: "",
            }
          - {
              NAME: linux,
              OS: ubuntu-24.04-arm,
              ARCH: arm,
              PATH: target/optimized/bob,
              TARGET: "",
            }
          - {
              NAME: macos,
              OS: macos-latest,
              ARCH: x86_64,
              PATH: target/x86_64-apple-darwin/optimized/bob,
              TARGET: "x86_64-apple-darwin",
            }
          - {
              NAME: windows,
              OS: windows-latest,
              ARCH: x86_64,
              PATH: build,
              TARGET: "",
            }
          - {
              NAME: macos,
              OS: macos-latest,
              ARCH: arm,
              PATH: target/optimized/bob,
              TARGET: "",
            }
    runs-on: ${{matrix.os.OS}}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
      - name: Add Rust target for cross-compilation
        if: matrix.os.TARGET != ''
        run: rustup target add ${{ matrix.os.TARGET }}
      - uses: Swatinem/rust-cache@v1
      - name: Build Bob
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --locked --profile optimized ${{ matrix.os.TARGET != '' && format('--target {0}', matrix.os.TARGET) || '' }}
      - name: Install AppImage tools & cargo-appimage
        if: matrix.os.NAME == 'linux'
        run: |
          sudo apt update && sudo apt install -y libfuse2

          cargo install cargo-appimage --locked
      - name: Build AppImage with cargo-appimage
        if: matrix.os.NAME == 'linux'
        run: |
          # cargo-appimage reads package.metadata.appimage from Cargo.toml
          cargo appimage

          # Find produced AppImage (workspace root or target/), normalize name to upload pattern
          APPIMAGE=$(ls *.AppImage 2>/dev/null | head -n1 || true)
          if [ -z "$APPIMAGE" ]; then
            APPIMAGE=$(ls target/*.AppImage 2>/dev/null | head -n1 || true)
          fi

          if [ -n "$APPIMAGE" ]; then
            echo "Found AppImage: $APPIMAGE"
            mv "$APPIMAGE" "bob-${{ matrix.os.ARCH }}.AppImage" || true
          else
            echo "No AppImage found; listing workspace for debugging:"
            ls -la
            ls -la target || true
            exit 1
          fi
      - name: Setup Bob build directory
        run: |
          mkdir build
          copy .\\bin\\vcruntime140.dll .\\build
          copy .\\target\\optimized\\bob.exe .\\build
        if: matrix.os.OS == 'windows-latest'
      - name: Upload Bob binary
        uses: actions/upload-artifact@v4
        with:
          name: "bob-${{ matrix.os.NAME }}-${{ matrix.os.ARCH }}"
          path: ${{ matrix.os.PATH }}
          if-no-files-found: error
          retention-days: 7
      - name: Upload Bob AppImage
        if: matrix.os.NAME == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: "bob-${{ matrix.os.NAME }}-${{ matrix.os.ARCH }}-appimage"
          path: "bob-${{ matrix.os.ARCH }}.AppImage*"
          if-no-files-found: error
          retention-days: 7
