name: Continuous Deployment

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Check version
        id: check_version
        run: |
          VERSION=v$(grep '^version =' Cargo.toml | cut -d '"' -f 2 | head -n 1)
          GIT_TAG_VERSION=${{ github.ref }}
          GIT_TAG_VERSION=${GIT_TAG_VERSION#refs/tags/}
          if [[ "$VERSION" != "$GIT_TAG_VERSION" ]]; then
            echo "Version in Cargo.toml ($VERSION) does not match pushed tag ($GIT_TAG_VERSION)"
            exit 1
          fi

  build:
    needs: [check-version]
    strategy:
      matrix:
        os:
          - {
              NAME: linux,
              OS: ubuntu-latest,
              ARCH: x86_64,
              PATH: target/optimized/bob,
              TARGET: "",
            }
          - {
              NAME: linux,
              OS: ubuntu-24.04-arm,
              ARCH: arm,
              PATH: target/optimized/bob,
              TARGET: "",
            }
          - {
              NAME: macos,
              OS: macos-latest,
              ARCH: x86_64,
              PATH: target/x86_64-apple-darwin/optimized/bob,
              TARGET: "x86_64-apple-darwin",
            }
          - {
              NAME: windows,
              OS: windows-latest,
              ARCH: x86_64,
              PATH: build,
              TARGET: "",
            }
          - {
              NAME: macos,
              OS: macos-latest,
              ARCH: arm,
              PATH: target/optimized/bob,
              TARGET: "",
            }
    runs-on: ${{matrix.os.OS}}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
      - name: Add Rust target for cross-compilation
        if: matrix.os.TARGET != ''
        run: rustup target add ${{ matrix.os.TARGET }}
      - uses: Swatinem/rust-cache@v1
      - name: Build Bob
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --locked --profile optimized ${{ matrix.os.TARGET != '' && format('--target {0}', matrix.os.TARGET) || '' }}
      - name: Install AppImage tools & cargo-appimage
        if: matrix.os.NAME == 'linux'
        run: |
          set -euo pipefail
          sudo apt update && sudo apt install -y libfuse2

          ARCH="${{ matrix.os.ARCH }}"
          if [ "$ARCH" = "arm" ] || [ "$ARCH" = "aarch64" ]; then
            URL="https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-aarch64.AppImage"
          else
            URL="https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          fi

          echo "Downloading appimagetool from $URL"
          wget -c "$URL" -O appimagetool
          chmod +x appimagetool

          # Move into PATH so tooling can call it
          sudo mv appimagetool /usr/local/bin/appimagetool
          echo "appimagetool installed at: $(command -v appimagetool)"

          cargo install cargo-appimage --locked
      - name: Build AppImage with cargo-appimage
        if: matrix.os.NAME == 'linux'
        run: |
          # cargo-appimage reads package.metadata.appimage from Cargo.toml
          cargo appimage

          # verify AppImage exists in the canonical location
          if ! ls target/appimage/*.AppImage >/dev/null 2>&1; then
            echo "No AppImage found under target/appimage/; listing for debugging:"
            ls -la target || true
            ls -la target/appimage || true
            exit 1
          fi

          echo "Found AppImage: $(ls target/appimage/*.AppImage | head -n1)"
      - name: Setup Bob build directory
        run: |
          mkdir build
          copy .\\bin\\vcruntime140.dll .\\build
          copy .\\target\\optimized\\bob.exe .\\build
        if: matrix.os.OS == 'windows-latest'
      - name: Upload Bob binary
        uses: actions/upload-artifact@v4
        with:
          name: "bob-${{ matrix.os.NAME }}-${{ matrix.os.ARCH }}"
          path: ${{ matrix.os.PATH }}
          if-no-files-found: error
      - name: Upload Bob AppImage
        if: matrix.os.NAME == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: "bob-${{ matrix.os.NAME }}-${{ matrix.os.ARCH }}-appimage"
          path: "target/appimage/*.AppImage"
          if-no-files-found: error
          retention-days: 7

  github-release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare Release Assets (Zip binaries, keep AppImages separate)
        run: |
          cd artifacts
          # Zip directories (binaries)
          find . -mindepth 1 -maxdepth 1 -type d -print0 | while IFS= read -r -d $'\0' dir; do
            base=$(basename "$dir")
            zip -r "${base}.zip" "$dir"
            rm -r "$dir" # Remove original directory after zipping
          done
          # Move AppImages and zsync files out of subdirectories if they exist
          find . -mindepth 2 -name '*.AppImage*' -exec mv {} . \;
          # Clean up any remaining empty directories from AppImage artifacts
          find . -mindepth 1 -maxdepth 1 -type d -empty -delete
          echo "Prepared assets:"
          ls -l
      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          files: |
            ./artifacts/*

  publish-cargo:
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      - uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
